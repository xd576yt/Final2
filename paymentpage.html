<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Redirecting to Secure Checkout</h1>
</header>

<section class="checkout">
  <h2>Taking you to payment...</h2>
  <p>Please wait.</p>
</section>

<script>
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

const links = {
  basic: "https://YOUR_STRIPE_LINK_BASIC",
  pro: "https://YOUR_STRIPE_LINK_PRO",
  elite: "https://YOUR_STRIPE_LINK_ELITE"
};

if (links[plan]) {
  window.location.href = links[plan];
} else {
  document.querySelector("h2").innerText = "Invalid plan selected";
}
</script>

</body>
</html>
